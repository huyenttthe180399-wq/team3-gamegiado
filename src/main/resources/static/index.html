<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game Puzzle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Màn hình bắt đầu -->
<div id="startScreen">
    <button id="startBtn">BẮT ĐẦU TRÒ CHƠI</button>
</div>

<!-- Nội dung game -->
<div id="gameScreen">

    <div class="game">

        <img src="background.png" class="background">

        <img src="leaf1.svg" class="leaf leaf1">
        <img src="leaf2.svg" class="leaf leaf2">
        <img src="leaf3.svg" class="leaf leaf3">
        <img src="leaf4.svg" class="leaf leaf4">
        <img src="leaf5.svg" class="leaf leaf5">
        <img src="leaf6.svg" class="leaf leaf6">

        <div class="answer-container">
            <input type="text" id="answerInput" placeholder="Nhập đáp án...">
            <button id="checkBtn">Kiểm tra</button>
            <span id="message"></span>
        </div>

    </div>

</div>
<script src="script.js"></script>
</body>
</html>
