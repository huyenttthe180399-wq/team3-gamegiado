<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hoàn thành thử thách</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #b9b4ab;
            height: 100vh;
            overflow: hidden;
        }

        .game {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* BACKGROUND IMAGE */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* KHUNG CLICK */
        .click-box {
            position: absolute;
            top: 70%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 380px;
            height: 50px;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .click-box:hover {
            background: rgba(255, 255, 255, 0.85);
            transform: translate(-50%, -50%) scale(1.05);
        }

        .click-box p {
            font-size: 12px;
            font-weight: bold;
            color: #2f2f2f;
            margin: 0;
        }

    </style>
</head>

<body>

<div class="game">

    <!-- BACKGROUND -->
    <img src="background5.svg" class="background">

    <!-- KHUNG CLICK -->
    <a href="https://forms.gle/nQKc2qAUGhHzfqSVA" target="_blank">
        <div class="click-box">
            <p>Nhấn vào đây để điền form nhận điểm</p>
        </div>
    </a>

</div>

</body>
</html>
